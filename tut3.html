<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>5 Image Popups with HTML & CSS</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .thumbnail {
      width: 200px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .thumbnail:hover {
      opacity: 0.8;
    }

    /* Popup style */
    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 999;
      text-align: center;
      padding-top: 60px;
    }

    .popup:target {
      display: block;
    }

    .popup img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 10px;
      box-shadow: 0 0 10px #fff;
    }

    .popup a {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 35px;
      text-decoration: none;
      font-weight: bold;
    }

    .popup a:hover {
      color: red;
    }
  </style>
</head>
<body>


<a href="#img1"><img src="1.webp" class="thumbnail" alt="Image 1"></a>
<a href="#img2"><img src="6.webp" class="thumbnail" alt="Image 2"></a>
<a href="#img3"><img src="22.webp" class="thumbnail" alt="Image 3"></a>
<a href="#img4"><img src="33.avif" class="thumbnail" alt="Image 4"></a>
<a href="#img5"><img src="11.avif" class="thumbnail" alt="Image 5"></a>

<!-- Popups -->
<div id="img1" class="popup">
  <a href="#">&times;</a>
  <img src="6.webp" alt="Full Image 1">
</div>

<div id="img2" class="popup">
  <a href="#">&times;</a>
  <img src="11.avif" alt="Full Image 2">
</div>

<div id="img3" class="popup">
  <a href="#">&times;</a>
  <img src="1.webp" alt="Full Image 3">
</div>

<div id="img4" class="popup">
  <a href="#">&times;</a>
  <img src="33.avif" alt="Full Image 4">
</div>

<div id="img5" class="popup">
  <a href="#">&times;</a>
  <img src="22.webp" alt="Full Image 5">
</div>

</body>
</html>
